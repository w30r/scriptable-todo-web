<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>meor todo list</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Second Brain</h1>
        <div id="rpg-badge">
          <span class="rpg-level">Lv. 1</span>
          <div class="rpg-xp-bar"><div class="rpg-xp-fill" style="width:0%"></div></div>
          <span class="rpg-streak"></span>
          <button id="stats-btn" title="Stats">📊</button>
        </div>
        <!-- <p class="subtitle">
          <a
            href="https://scriptable-todo.onrender.com/api/todos"
            target="_blank"
            >Scriptable Todo API</a
          >
          &middot; Tags: !ui !nui !uni
        </p> -->
      </header>

      <div class="tabs">
        <button class="tab active" data-tab="todo" id="tab-todo">TODO</button>
        <button class="tab" data-tab="shopping" id="tab-shopping">
          SHOPPING
        </button>
        <button class="tab" data-tab="calendar" id="tab-calendar">CALENDAR</button>
      </div>

      <div id="pomodoro-bar">
        <span id="pomo-icon">⏱</span>
        <span id="pomo-time">25:00</span>
        <button id="pomo-start" class="pomo-btn">▶</button>
        <button id="pomo-reset" class="pomo-btn">⟳</button>
        <span id="pomo-sessions"></span>
      </div>

    <div id="todo-section">
      <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <input type="text" id="todo-search" class="search-input" placeholder="Search todos..." />

        <div id="matrix" class="matrix">
          <div class="loading">Loading todos...</div>
        </div>

        <div class="stats">
          <span id="todo-count">0 items left</span>
          <span id="today-count"></span>
          <button id="clear-completed" class="clear-btn">
            Clear completed
          </button>
        </div>
      </div>

      <div id="shopping-section" style="display: none">
        <form id="shop-form" class="shop-form">
          <div class="input-row">
            <input
              type="text"
              id="shop-input"
              placeholder="What to buy?"
              required
            />
          <select id="shop-category">
            <option value="grocery">Grocery</option>
            <option value="watsons">Watsons / Pharmacy</option>
            <option value="mrdiy">MRDIY</option>
            <option value="online">Online</option>
            <option value="etc">Etc</option>
          </select>
            <button type="submit" id="shop-add-btn">Add</button>
          </div>
        </form>

        <div class="shop-filters">
          <button class="shop-filter-btn active" data-cat="all">All</button>
          <button class="shop-filter-btn" data-cat="grocery">Grocery</button>
          <button class="shop-filter-btn" data-cat="watsons">Watsons</button>
        <button class="shop-filter-btn" data-cat="mrdiy">MRDIY</button>
        <button class="shop-filter-btn" data-cat="online">Online</button>
        <button class="shop-filter-btn" data-cat="etc">Etc</button>
      </div>

        <input type="text" id="shop-search" class="search-input" placeholder="Search shopping items..." />

        <div id="shopping-list" class="shopping-list">
          <div class="loading">Loading shopping items...</div>
        </div>

        <div class="shop-stats stats">
          <span id="shop-count">0 items</span>
          <span id="shop-bought-count"></span>
          <button id="clear-bought" class="clear-btn">Clear bought</button>
        </div>
      </div>

      <div id="calendar-section" style="display: none">
        <div class="cal-nav">
          <button id="cal-prev" class="cal-nav-btn">←</button>
          <span id="cal-title" class="cal-title"></span>
          <button id="cal-next" class="cal-nav-btn">→</button>
        </div>
        <div class="cal-grid" id="cal-grid">
          <div class="cal-day-header">Sun</div>
          <div class="cal-day-header">Mon</div>
          <div class="cal-day-header">Tue</div>
          <div class="cal-day-header">Wed</div>
          <div class="cal-day-header">Thu</div>
          <div class="cal-day-header">Fri</div>
          <div class="cal-day-header">Sat</div>
        </div>
      </div>

    <button id="float-add-btn">+</button>

    <div id="edit-modal" class="modal-overlay" style="display:none">
      <div class="modal-card">
        <div class="modal-header">
          <h3>Edit Task</h3>
          <button class="modal-close" id="edit-close">✕</button>
        </div>
        <input type="text" id="edit-input" placeholder="Task title">
        <div class="modal-date-row">
          <label for="edit-date">Due date</label>
          <input type="date" id="edit-date">
        </div>
        <p class="modal-hint">Tap a quadrant to change</p>
        <div class="modal-quadrants" id="edit-quadrants">
          <button class="modal-quadrant q1" data-tag="!ui">
            <span class="mq-title">Do First</span>
            <span class="mq-sub">Urgent &amp; Important</span>
          </button>
          <button class="modal-quadrant q2" data-tag="!nui">
            <span class="mq-title">Schedule</span>
            <span class="mq-sub">Not Urgent &amp; Important</span>
          </button>
          <button class="modal-quadrant q3" data-tag="!uni">
            <span class="mq-title">Delegate</span>
            <span class="mq-sub">Urgent &amp; Not Important</span>
          </button>
          <button class="modal-quadrant q4" data-tag="">
            <span class="mq-title">Eliminate</span>
            <span class="mq-sub">Not Urgent &amp; Not Important</span>
          </button>
        </div>
        <button class="edit-save-btn" id="edit-save">Save</button>
      </div>
    </div>

    <div id="add-modal" class="modal-overlay" style="display:none">
      <div class="modal-card">
        <div class="modal-header">
          <h3>New Task</h3>
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        <input type="text" id="modal-input" placeholder="What needs to be done?">
        <p class="modal-hint">Tap a quadrant to add</p>
        <div class="modal-date-row" style="display:none">
          <label for="modal-date">Due date</label>
          <input type="date" id="modal-date">
        </div>
        <div class="modal-quadrants">
          <button class="modal-quadrant q1" data-tag="!ui">
            <span class="mq-title">Do First</span>
            <span class="mq-sub">Urgent &amp; Important</span>
          </button>
          <button class="modal-quadrant q2" data-tag="!nui">
            <span class="mq-title">Schedule</span>
            <span class="mq-sub">Not Urgent &amp; Important</span>
          </button>
          <button class="modal-quadrant q3" data-tag="!uni">
            <span class="mq-title">Delegate</span>
            <span class="mq-sub">Urgent &amp; Not Important</span>
          </button>
          <button class="modal-quadrant q4" data-tag="">
            <span class="mq-title">Eliminate</span>
            <span class="mq-sub">Not Urgent &amp; Not Important</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="stats-modal" class="modal-overlay" style="display:none">
    <div class="modal-card modal-card-wide">
      <div class="modal-header">
        <h3>Stats Dashboard</h3>
        <button class="modal-close" id="stats-close">✕</button>
      </div>
      <div class="stats-content" id="stats-content">
        <div class="loading">Loading stats...</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  </body>
</html>
